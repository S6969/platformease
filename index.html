<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlatformEase</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
    
    <!-- DNS prefetch for Firebase -->
    <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com">
    <link rel="dns-prefetch" href="//securetoken.googleapis.com">
    <link rel="dns-prefetch" href="//firestore.googleapis.com">
    <link rel="dns-prefetch" href="//platformease-789fb.firebaseapp.com">
    
    <!-- Preconnect to Firebase domains -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://accounts.google.com" crossorigin>
    <link rel="preconnect" href="https://apis.google.com" crossorigin>
    
    <!-- Prefetch critical signup resources -->
    <link rel="prefetch" href="/src/pages/CreateAccount.tsx">
    <link rel="prefetch" href="/src/lib/firebase-auth.ts">
    
    <!-- Preload critical JavaScript modules -->
    <link rel="modulepreload" href="/src/main.tsx">
    <link rel="modulepreload" href="/src/App.tsx">
    
    <!-- Critical CSS inline (will be replaced by Vite) -->
    <style>
      /* Critical above-the-fold styles */
      body { margin: 0; font-family: Inter, system-ui, sans-serif; }
      .loading-screen { 
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
      }
      .loading-spinner {
        border: 4px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top: 4px solid white;
        width: 40px; height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <!-- Meta tags -->
    <meta property="og:title" content="PlatformEase" />
    <meta property="og:description" content="Your All-in-One Platform Solution" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PlatformEase" />
    <meta name="twitter:image" content="/placeholder.svg" />

    <script>
      try {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        console.warn('Failed to initialize theme:', e);
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
